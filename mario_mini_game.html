<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Platform Game</title>
<style>
body{margin:0;background:#87ceeb;font-family:sans-serif;text-align:center}
canvas{display:block;margin:auto;background:#5c94fc}
.controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:20px}
button{font-size:28px;padding:15px 25px;border:none;border-radius:10px;background:#222;color:#fff}
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<div class="controls">
<button id="left">⬅️</button>
<button id="jump">⏫</button>
<button id="right">➡️</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

let player={x:50,y:300,w:30,h:30,vy:0,jump:false};
let gravity=0.5;

let platforms=[
{x:0,y:350,w:800,h:50},
{x:200,y:280,w:120,h:20},
{x:400,y:220,w:120,h:20},
{x:600,y:260,w:120,h:20}
];

let coins=[
{x:230,y:240,r:8,collected:false},
{x:430,y:180,r:8,collected:false},
{x:630,y:220,r:8,collected:false}
];

let score=0;

function drawPlayer(){
ctx.fillStyle='red';
ctx.fillRect(player.x,player.y,player.w,player.h);
}

function drawPlatforms(){
ctx.fillStyle='green';
platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));
}

function drawCoins(){
coins.forEach(c=>{
if(!c.collected){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fillStyle='yellow';
ctx.fill();
}
});
}

function physics(){
player.vy+=gravity;
player.y+=player.vy;

platforms.forEach(p=>{
if(player.x<p.x+p.w && player.x+player.w>p.x && player.y+player.h>p.y && player.y+player.h<p.y+20){
player.y=p.y-player.h;
player.vy=0;
player.jump=false;
}
});
}

function coinCheck(){
coins.forEach(c=>{
if(!c.collected && player.x<c.x+10 && player.x+player.w>c.x-10 && player.y<c.y+10 && player.y+player.h>c.y-10){
c.collected=true;
score++;
}
});
}

function drawScore(){
ctx.fillStyle='white';
ctx.font='20px Arial';
ctx.fillText('Score: '+score,10,25);
}

function update(){
ctx.clearRect(0,0,canvas.width,canvas.height);
physics();
coinCheck();

drawPlatforms();
drawCoins();
drawPlayer();
drawScore();

requestAnimationFrame(update);
}

window.addEventListener('keydown',e=>{
if(e.code==='ArrowRight')player.x+=10;
if(e.code==='ArrowLeft')player.x-=10;
if(e.code==='Space' && !player.jump){
player.vy=-10;
player.jump=true;
}
});

document.getElementById('left').addEventListener('touchstart',()=>{player.x-=15});
document.getElementById('right').addEventListener('touchstart',()=>{player.x+=15});
document.getElementById('jump').addEventListener('touchstart',()=>{
if(!player.jump){
player.vy=-10;
player.jump=true;
}
});

update();
</script>

</body>
</html>
